<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDPE MAGIC PRO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: white;
            font-family: 'Arial', sans-serif;
            overflow-x: hidden;
        }
        /* Magic Box Sidebar */
        .magic-box {
            position: fixed;
            top: 0;
            left: -250px;
            width: 250px;
            height: 100%;
            background: rgba(20, 20, 20, 0.95);
            border-right: 2px solid #00d2ff;
            transition: 0.5s;
            z-index: 1000;
            padding: 20px;
            box-shadow: 5px 0 15px rgba(0, 210, 255, 0.3);
        }
        .magic-box.active { left: 0; }
        
        /* Main Header */
        header {
            height: 60px;
            background: #111;
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid #333;
            justify-content: space-between;
        }
        .menu-btn {
            font-size: 24px;
            color: #00d2ff;
            cursor: pointer;
        }

        /* Hero Section */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 90vh;
            text-align: center;
        }
        .main-logo {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 4px solid #00d2ff;
            box-shadow: 0 0 30px #00d2ff;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 28px;
            letter-spacing: 4px;
            text-shadow: 0 0 10px #00d2ff;
            color: #00d2ff;
        }

        /* Navigation Buttons */
        .nav-controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .nav-btn {
            width: 50px;
            height: 50px;
            background: #00d2ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: black;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 10px #00d2ff;
        }
    </style>
</head>
<body>

    <div class="magic-box" id="magicBox">
        <h2 style="color: #00d2ff;">MAGIC BOX</h2>
        <hr style="border: 0.5px solid #333; margin: 15px 0;">
        <p>✨ Photo Editor</p><br>
        <p>🎬 Video Tools</p><br>
        <p>🎨 AI Filters</p><br>
        <p>⚙️ Settings</p>
    </div>

    <header>
        <div class="menu-btn" onclick="toggleMagic()">☰</div>
        <div style="letter-spacing: 2px;">GDPE PRO</div>
        <div style="color: #00d2ff;">★</div>
    </header>

    <div class="hero">
        <img src="logo.jpg" alt="Logo" class="main-logo">
        <h1>GDPE PRO EDIT</h1>
        <p style="color: #888; margin-top: 10px;">The Future of Mobile Editing</p>
        <button style="margin-top: 30px; padding: 10px 25px; background: transparent; border: 1px solid #00d2ff; color: #00d2ff; border-radius: 20px;">GET STARTED</button>
    </div>

    <div class="nav-controls">
        <div class="nav-btn" onclick="window.scrollTo(0,0)">↑</div>
        <div class="nav-btn" onclick="window.scrollTo(0, document.body.scrollHeight)">↓</div>
    </div>

    <script>
        function toggleMagic() {
            document.getElementById('magicBox').classList.toggle('active');
        }
    </script>
</body>
</html>
